$kind: http-request
method: POST
url: "{{baseUrl}}/api/uploads/presign"
order: 1000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{authToken}}"
body:
  type: json
  content: |-
    {
      "filename": "sample.jpg",
      "contentType": "image/jpeg"
    }
