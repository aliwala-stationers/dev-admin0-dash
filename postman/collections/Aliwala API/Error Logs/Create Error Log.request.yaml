$kind: http-request
method: POST
url: "{{baseUrl}}/api/error-logs"
order: 1000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: noauth
body:
  type: json
  content: |-
    {
      "message": "Unhandled client error",
      "stack": "Error: sample",
      "url": "https://example.com/page",
      "userAgent": "Mozilla/5.0"
    }
