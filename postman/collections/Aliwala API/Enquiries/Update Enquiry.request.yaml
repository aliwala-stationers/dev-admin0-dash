$kind: http-request
method: PUT
url: "{{baseUrl}}/api/enquiries/{{enquiryId}}"
order: 4000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{authToken}}"
body:
  type: json
  content: |-
    {
      "status": "contacted"
    }
