$kind: http-request
method: PUT
url: "{{baseUrl}}/api/categories/{{categoryId}}"
order: 4000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{authToken}}"
body:
  type: json
  content: |-
    {
      "name": "Updated Category",
      "slug": "updated-category",
      "description": "Updated description",
      "status": true,
      "image": "https://example.com/category.jpg"
    }
