$kind: http-request
method: POST
url: "{{baseUrl}}/api/brands"
order: 2000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{authToken}}"
body:
  type: json
  content: |-
    {
      "name": "Sample Brand",
      "slug": "sample-brand",
      "description": "Sample brand description",
      "status": true,
      "image": "https://example.com/brand.jpg"
    }
