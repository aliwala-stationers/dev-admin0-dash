$kind: http-request
method: PUT
url: "{{baseUrl}}/api/newsletter/{{subscriberId}}"
order: 4000
headers:
  - key: Content-Type
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: "{{authToken}}"
body:
  type: json
  content: |-
    {
      "email": "subscriber@example.com",
      "isActive": true,
      "meta": {
        "source": "landing-page"
      }
    }
